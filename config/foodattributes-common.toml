#Global multipliers applied to all food attribute injections.
#Multiplier applied to all modifier values when a food is eaten normally.
# Default: 1.0
# Range: 0.0 ~ 1.7976931348623157E308
globalMultiplier = 1.0
#Multiplier applied to all injection durations when a food is eaten normally.
# Default: 1.0
# Range: 0.0 ~ 1.7976931348623157E308
globalDurationMultiplier = 2.0
#Multiplier applied to modifier values inherited from ingredients when the result is produced by a cooking recipe (smelting, smoking, blasting, campfire cooking).
# Default: 1.0
# Range: 0.0 ~ 1.7976931348623157E308
smeltingMultiplier = 2.0
#Multiplier applied to inherited injection durations when the result is produced by a cooking recipe (smelting, smoking, blasting, campfire cooking).
# Default: 1.0
# Range: 0.0 ~ 1.7976931348623157E308
smeltingDurationMultiplier = 2.0
#Cuisine Delight integration settings.
#Extra multiplier applied to modifier values when the food is part of a Cuisine Delight plate (stacks with globalMultiplier).
# Default: 1.0
# Range: 0.0 ~ 1.7976931348623157E308
cuisineDelightMultiplier = 1.0
#Extra multiplier applied to injection durations when the food is part of a Cuisine Delight plate (stacks with globalDurationMultiplier).
# Default: 1.0
# Range: 0.0 ~ 1.7976931348623157E308
cuisineDelightDurationMultiplier = 1.0
#If true, normal food consumption grants no attributes; attributes are only applied when eating via a Cuisine Delight plate.
cuisineDelightOnlyMode = false
